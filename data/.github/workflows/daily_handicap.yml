name: Daily MLB HR Handicapper

on:
  schedule:
    - cron: '0 14 * * *' # Triggers automatically every single day at 10:00 AM EST
  workflow_dispatch: # Gives you a manual "Run Now" button on GitHub

jobs:
  run-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo Code
        uses: actions/checkout@v3

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependenciespip
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Handicap Engine
        run: |
          python run_daily_predictions.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
