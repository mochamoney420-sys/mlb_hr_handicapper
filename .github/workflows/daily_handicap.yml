name: Daily MLB HR Prediction Pipeline

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pandas numpy xgboost requests pybaseball MLB-StatsAPI mlb; fi
      - name: Execute handicapping model script
        env:
          DISCORD_MLB_WEBHOOK: "${{ secrets.DISCORD_WEBHOOK_URL }}"
        run: python run_daily_predictions.py
