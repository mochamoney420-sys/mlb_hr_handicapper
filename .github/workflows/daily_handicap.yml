name: Daily MLB HR Prediction Pipeline

on:
  schedule:
    # 9:00 AM Eastern Time (market open)
    # During EDT: 1:00 PM UTC (cron 0 13)
    # During EST: 2:00 PM UTC (cron 0 14)
    # GitHub uses UTC only, so we use 13:00 UTC as approximation
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4.1.7
      - name: Set up Python environment
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pandas numpy xgboost requests pybaseball MLB-StatsAPI mlb; fi
      - name: Execute handicapping model script
        env:
          DISCORD_MLB_WEBHOOK: "${{ secrets.DISCORD_WEBHOOK_URL }}"
        run: python run_daily_predictions.py
      - name: Upload predictions CSV
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-predictions
          path: data/predictions_*.csv
          retention-days: 30
