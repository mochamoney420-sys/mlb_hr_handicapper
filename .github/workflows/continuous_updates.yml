name: Continuous Prediction Updates (Every 4 Hours)

on:
  schedule:
    # Run every 4 hours during game day (10 AM - 10 PM ET)
    # 10 AM ET = 2 PM UTC = cron '0 14'
    # 2 PM ET = 6 PM UTC = cron '0 18'
    # 6 PM ET = 10 PM UTC = cron '0 22'
    # 10 PM ET = 2 AM UTC = cron '0 2'
    - cron: '0 14,18,22,2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5
      
      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pandas numpy xgboost requests pybaseball MLB-StatsAPI; fi
      
      - name: Check for prediction updates
        env:
          DISCORD_MLB_WEBHOOK: "${{ secrets.DISCORD_WEBHOOK_URL }}"
        run: python update_predictions.py
      
      - name: Upload updated predictions
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: updated-predictions-${{ github.run_number }}
          path: data/predictions_*.csv
          if-no-files-found: warn
          retention-days: 7
      
      - name: Upload update logs
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: update-logs-${{ github.run_number }}
          path: data/prediction_updates_*.json
          if-no-files-found: warn
          retention-days: 7
