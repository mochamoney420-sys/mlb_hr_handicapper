name: Continuous Prediction Updates (Every 2 Hours)

on:
  schedule:
    # Run every 2 hours during game day (10 AM - 10 PM ET)
    # 10 AM ET = 2 PM UTC = cron '0 14'
    # 12 PM ET = 4 PM UTC = cron '0 16'
    # 2 PM ET = 6 PM UTC = cron '0 18'
    # 4 PM ET = 8 PM UTC = cron '0 20'
    # 6 PM ET = 10 PM UTC = cron '0 22'
    # 8 PM ET = 12 AM UTC = cron '0 0'
    # 10 PM ET = 2 AM UTC = cron '0 2'
    - cron: '0 14,16,18,20,22,0,2 * * *'
  workflow_dispatch:

jobs:
  update-predictions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4.1.7
      
      - name: Set up Python environment
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pandas numpy xgboost requests pybaseball MLB-StatsAPI; fi
      
      - name: Check for prediction updates
        env:
          DISCORD_MLB_WEBHOOK: "${{ secrets.DISCORD_WEBHOOK_URL }}"
        run: python update_predictions.py
      
      - name: Upload updated predictions
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: updated-predictions-${{ github.run_number }}
          path: data/predictions_*.csv
          retention-days: 7
      
      - name: Upload update logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: update-logs-${{ github.run_number }}
          path: data/prediction_updates_*.json
          retention-days: 7
