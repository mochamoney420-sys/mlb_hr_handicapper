name: Weekly Model Maintenance

on:
  schedule:
    # Sunday 15:30 UTC
    - cron: '30 15 * * 0'
  workflow_dispatch:

jobs:
  weekly-self-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4.1.7

      - name: Set up Python environment
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pandas numpy xgboost requests pybaseball MLB-StatsAPI; fi

      - name: Run weekly self-check
        env:
          DISCORD_MLB_WEBHOOK: "${{ secrets.DISCORD_WEBHOOK_URL }}"
        run: |
          mkdir -p data
          python run_daily_predictions.py --self-check --backfill-days 30 | tee data/self_check_$(date +%F).txt

      - name: Upload self-check artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-self-check-${{ github.run_number }}
          path: |
            data/self_check_*.txt
            data/predictions_*.csv
            data/evaluation_*.csv
          retention-days: 30
