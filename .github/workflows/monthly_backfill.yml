name: Monthly Physics Backfill

on:
  schedule:
    # First day of month at 16:00 UTC
    - cron: '0 16 1 * *'
  workflow_dispatch:

jobs:
  monthly-backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pandas numpy xgboost requests pybaseball MLB-StatsAPI; fi

      - name: Run monthly backfill and self-check
        env:
          DISCORD_MLB_WEBHOOK: "${{ secrets.DISCORD_WEBHOOK_URL }}"
        run: |
          mkdir -p data
          python run_daily_predictions.py --backfill-physics --backfill-days 120 | tee data/monthly_backfill_$(date +%F).txt

      - name: Upload backfill artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: monthly-backfill-${{ github.run_number }}
          path: |
            data/monthly_backfill_*.txt
            data/predictions_*.csv
          retention-days: 30
